[pytest]
asyncio_mode = auto
testpaths = backend/tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    phase1: Data layer tests (require network or fixtures)
    phase2: Schema and config tests (no network needed)
    phase3: Agent output tests (require cached fixtures)
    phase4: LangGraph graph tests (require cached fixtures + API key)
    unit: Pure computation tests — no I/O, always fast
    integration: Tests that hit the real cache or network
